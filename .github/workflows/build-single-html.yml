name: Build React to Single HTML

# Trigger on pushes to the main branch and allow manual dispatch
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-inline:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js (adjust version as needed)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies – package-lock.json will be generated
      - name: Install dependencies
        run: npm install

      # 4. Build the React app (assumes "build" script in package.json)
      - name: Build
        run: npm run build

      # 5. Inline all external CSS and JS into a single HTML file
      #    The tool "html-inline" processes build/index.html and embeds
      #    all referenced scripts and stylesheets directly into the HTML.
      - name: Inline assets
        run: npx html-inline -i build/index.html -o build/index-inlined.html

      # 6. Upload the resulting single HTML file as an artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-single-html
          path: build/index-inlined.html
