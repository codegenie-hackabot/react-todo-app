name: Build to Single HTML
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Generate package.json
      run: |
        cat > package.json << EOF
        {
          "name": "my-project",
          "version": "1.0.0",
          "private": true,
          "scripts": {
            "build": "parcel build src/index.html --dist-dir dist --public-url ./"
          },
          "devDependencies": {
            "parcel": "^2.11.0"
          }
        }
        EOF
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build project
      run: npm run build
      
    - name: Inline assets to single HTML
      run: |
        npm install --save-dev web-resource-inliner
        cat > inline.js << 'EOF'
        const fs = require("fs");
        const inline = require("web-resource-inliner");
        
        inline.html({
          fileContent: fs.readFileSync("dist/index.html", "utf8"),
          relativeTo: "dist"
        }, (err, result) => {
          if (err) throw err;
          fs.writeFileSync("dist/index.html", result);
          console.log("✅ Single HTML file created at dist/index.html");
        });
        EOF
        node inline.js
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: single-html-build
        path: dist/index.html
        
    - name: Display file size
      run: |
        echo "📊 Final HTML file size:"
        ls -lh dist/index.html
